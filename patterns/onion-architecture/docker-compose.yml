services:
  postgres:
    image: postgres:16-alpine
    container_name: onionarch-postgres
    environment:
      POSTGRES_DB: onionarch
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports:
      - "5432:5432"
    volumes:
      - onion-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d onionarch"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - onionarch-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onionarch-api
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__Database=Host=postgres;Database=onionarch;Username=demo;Password=demo123
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - onionarch-network

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: onionarch-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - onionarch-network

volumes:
  onion-postgres-data:
    name: onionarch-postgres-data

networks:
  onionarch-network:
    name: onionarch-network
    driver: bridge
